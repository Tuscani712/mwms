    <rect x="-44" y="-44" width="88" height="88" stroke="url(#g)" stroke-width="2" fill="none" transform="rotate(45)"/>
    <rect x="-26" y="-26" width="52" height="52" stroke="#F4F1EA" stroke-opacity="0.50" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="6" fill="url(#g)"/>
  </g>

  <!-- Corner ticks -->
  <path d="M28 20 H20 V28" stroke="#F4F1EA" stroke-opacity="0.40" stroke-width="1.5" fill="none"/>
  <path d="M172 20 H180 V28" stroke="#F4F1EA" stroke-opacity="0.40" stroke-width="1.5" fill="none"/>
  <path d="M28 180 H20 V172" stroke="#F4F1EA" stroke-opacity="0.40" stroke-width="1.5" fill="none"/>
  <path d="M172 180 H180 V172" stroke="#F4F1EA" stroke-opacity="0.40" stroke-width="1.5" fill="none"/>
