<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-label="Client logo placeholder">
  <!-- Geometric placeholder mark — replace this entire SVG with the client's logo -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B1A"/>
      <stop offset="100%" stop-color="#FFB627"/>
    </linearGradient>
  </defs>

  <!-- Frame -->
  <rect x="20" y="20" width="160" height="160" stroke="#F4F1EA" stroke-opacity="0.18" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Mark -->
